<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculus — Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.09);
      --btn-num: #16161f;
      --btn-num-hover: #1e1e2d;
      --btn-op: #1a1040;
      --btn-op-hover: #231552;
      --btn-eq: #4f46e5;
      --btn-eq-hover: #6056f5;
      --btn-clear: #1f1010;
      --btn-clear-hover: #2e1515;
      --accent: #6056f5;
      --accent2: #a78bfa;
      --text: #f0effe;
      --text-dim: #6b6b80;
      --display-bg: #07070d;
      --red: #ef4444;
      --green: #22c55e;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(79,70,229,0.18) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-50px, -60px); } }

    /* ── CALCULATOR SHELL ── */
    .calc-wrap {
      position: relative;
      z-index: 1;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.85) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .calc {
      width: 340px;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      padding: 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(79,70,229,0.08);
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid texture */
    .calc::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 32px 32px;
      border-radius: inherit;
      pointer-events: none;
    }

    /* ── HEADER ── */
    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calc-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .calc-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .dot-r { background: #ef4444; }
    .dot-y { background: #f59e0b; }
    .dot-g { background: #22c55e; }

    /* ── DISPLAY ── */
    .display {
      background: var(--display-bg);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 18px 20px 14px;
      margin-bottom: 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      position: relative;
      overflow: hidden;
    }

    .display::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(to bottom, rgba(79,70,229,0.04), transparent);
      pointer-events: none;
    }

    .display-expression {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      min-height: 18px;
      text-align: right;
      word-break: break-all;
      font-weight: 300;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }

    .display-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.6rem;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      letter-spacing: -0.02em;
      line-height: 1;
      transition: transform 0.1s, color 0.2s;
      word-break: break-all;
      max-width: 100%;
    }

    .display-value.pulse {
      animation: valuePulse 0.15s ease;
    }

    @keyframes valuePulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .display-value.error { color: #ef4444; }
    .display-value.result { color: var(--accent2); }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Button base */
    .btn {
      border: none;
      border-radius: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
      outline: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
    }

    /* Ripple */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0);
      transition: background 0.3s;
    }

    .btn:active::after { background: rgba(255,255,255,0.08); }
    .btn:active { transform: scale(0.94); }

    /* Number buttons */
    .btn-num {
      background: var(--btn-num);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .btn-num:hover {
      background: var(--btn-num-hover);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    /* Operator buttons */
    .btn-op {
      background: var(--btn-op);
      color: var(--accent2);
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(167,139,250,0.1);
      border-color: rgba(79,70,229,0.2);
    }

    .btn-op:hover {
      background: var(--btn-op-hover);
      box-shadow: 0 4px 16px rgba(79,70,229,0.2), inset 0 1px 0 rgba(167,139,250,0.15);
      transform: translateY(-1px);
    }

    /* Clear / modifier buttons */
    .btn-mod {
      background: var(--btn-clear);
      color: #fca5a5;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      border-color: rgba(239,68,68,0.1);
    }

    .btn-mod:hover {
      background: var(--btn-clear-hover);
      box-shadow: 0 4px 16px rgba(239,68,68,0.15);
      transform: translateY(-1px);
    }

    /* Equals button */
    .btn-eq {
      background: var(--btn-eq);
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow:
        0 4px 20px rgba(79,70,229,0.4),
        inset 0 1px 0 rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.1);
    }

    .btn-eq:hover {
      background: var(--btn-eq-hover);
      box-shadow:
        0 6px 28px rgba(79,70,229,0.55),
        inset 0 1px 0 rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    /* Zero button spans 2 cols */
    .btn-zero {
      grid-column: span 2;
      border-radius: 14px;
      justify-content: flex-start;
      padding-left: 24px;
    }

    /* Span-2 utility */
    .span2 { grid-column: span 2; }

    /* Special label styling */
    .btn-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
    }

    /* ── HISTORY STRIP ── */
    .history-strip {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      min-height: 28px;
    }

    .history-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: 'Syne', sans-serif;
    }

    .history-items {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 68px;
      overflow: hidden;
    }

    .history-item {
      font-size: 0.7rem;
      color: rgba(107,107,128,0.7);
      text-align: right;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }

    /* ── KEYBOARD INDICATOR ── */
    .kbd-hint {
      text-align: center;
      margin-top: 14px;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: rgba(107,107,128,0.45);
      font-family: 'Syne', sans-serif;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="calc-wrap">
    <div class="calc">

      <div class="calc-header">
        <span class="calc-title">Calculus</span>
        <div class="calc-dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
      </div>

      <div class="display">
        <div class="display-expression" id="expression"></div>
        <div class="display-value" id="display">0</div>
      </div>

      <div class="btn-grid">

        <!-- Row 1 -->
        <button class="btn btn-mod btn-label" data-action="clear">AC</button>
        <button class="btn btn-mod btn-label" data-action="sign">+/−</button>
        <button class="btn btn-mod btn-label" data-action="percent">%</button>
        <button class="btn btn-op" data-action="operator" data-value="÷">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="digit" data-value="7">7</button>
        <button class="btn btn-num" data-action="digit" data-value="8">8</button>
        <button class="btn btn-num" data-action="digit" data-value="9">9</button>
        <button class="btn btn-op" data-action="operator" data-value="×">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="digit" data-value="4">4</button>
        <button class="btn btn-num" data-action="digit" data-value="5">5</button>
        <button class="btn btn-num" data-action="digit" data-value="6">6</button>
        <button class="btn btn-op" data-action="operator" data-value="−">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="digit" data-value="1">1</button>
        <button class="btn btn-num" data-action="digit" data-value="2">2</button>
        <button class="btn btn-num" data-action="digit" data-value="3">3</button>
        <button class="btn btn-op" data-action="operator" data-value="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-action="digit" data-value="0">0</button>
        <button class="btn btn-num" data-action="decimal">.</button>
        <button class="btn btn-eq" data-action="equals">=</button>

      </div>

      <!-- History -->
      <div class="history-strip">
        <div class="history-label">History</div>
        <div class="history-items" id="history"></div>
      </div>

      <p class="kbd-hint">Keyboard supported ↑</p>
    </div>
  </div>

  <script>
    // ── STATE ──
    let currentVal = '0';
    let previousVal = '';
    let operator = null;
    let waitingForOperand = false;
    let justCalculated = false;
    const history = [];

    // ── ELEMENTS ──
    const display = document.getElementById('display');
    const expression = document.getElementById('expression');
    const historyEl = document.getElementById('history');

    // ── DISPLAY UPDATE ──
    function updateDisplay(val, isResult = false, isError = false) {
      display.classList.remove('pulse', 'result', 'error');
      void display.offsetWidth; // reflow for animation restart
      display.classList.add('pulse');
      if (isResult) display.classList.add('result');
      if (isError) display.classList.add('error');

      // Format large numbers
      let formatted = val;
      if (!isNaN(val) && val !== '' && !val.includes('e')) {
        const num = parseFloat(val);
        if (Math.abs(num) >= 1e12 || (Math.abs(num) < 1e-6 && num !== 0)) {
          formatted = num.toExponential(4);
        } else {
          // Add thousand separators only for integers > 999 in result mode
          if (isResult && Number.isInteger(num) && Math.abs(num) < 1e12) {
            formatted = num.toLocaleString();
          }
        }
      }

      // Shrink font for long numbers
      const len = formatted.length;
      if (len > 12) display.style.fontSize = '1.2rem';
      else if (len > 9) display.style.fontSize = '1.8rem';
      else if (len > 6) display.style.fontSize = '2.2rem';
      else display.style.fontSize = '2.6rem';

      display.textContent = formatted;
    }

    function updateExpression(text) {
      expression.textContent = text;
    }

    // ── DIGIT INPUT ──
    function inputDigit(digit) {
      if (justCalculated) {
        currentVal = digit;
        justCalculated = false;
        waitingForOperand = false;
        updateExpression('');
      } else if (waitingForOperand) {
        currentVal = digit;
        waitingForOperand = false;
      } else {
        currentVal = currentVal === '0' ? digit : currentVal + digit;
        if (currentVal.length > 15) return; // cap input length
      }
      updateDisplay(currentVal);
    }

    // ── DECIMAL ──
    function inputDecimal() {
      if (waitingForOperand) {
        currentVal = '0.';
        waitingForOperand = false;
        updateDisplay(currentVal);
        return;
      }
      if (!currentVal.includes('.')) {
        currentVal += '.';
        updateDisplay(currentVal);
      }
    }

    // ── OPERATOR ──
    function handleOperator(op) {
      const current = parseFloat(currentVal);

      if (operator && !waitingForOperand) {
        const result = calculate(parseFloat(previousVal), current, operator);
        if (result === null) { showError(); return; }
        currentVal = String(result);
        updateDisplay(currentVal);
      }

      previousVal = currentVal;
      operator = op;
      waitingForOperand = true;
      justCalculated = false;

      updateExpression(previousVal + ' ' + op);
    }

    // ── CALCULATE ──
    function calculate(a, b, op) {
      if (op === '+') return roundResult(a + b);
      if (op === '−') return roundResult(a - b);
      if (op === '×') return roundResult(a * b);
      if (op === '÷') {
        if (b === 0) return null;
        return roundResult(a / b);
      }
      return b;
    }

    function roundResult(n) {
      // Avoid float artifacts like 0.1+0.2 = 0.30000000000000004
      return parseFloat(n.toPrecision(12));
    }

    // ── EQUALS ──
    function handleEquals() {
      if (!operator || waitingForOperand) return;

      const a = parseFloat(previousVal);
      const b = parseFloat(currentVal);
      const result = calculate(a, b, operator);

      if (result === null) { showError(); return; }

      const expr = `${previousVal} ${operator} ${currentVal} =`;
      addHistory(expr + ' ' + result);
      updateExpression(expr);
      currentVal = String(result);
      operator = null;
      waitingForOperand = false;
      justCalculated = true;

      updateDisplay(currentVal, true);
    }

    // ── CLEAR ──
    function handleClear() {
      currentVal = '0';
      previousVal = '';
      operator = null;
      waitingForOperand = false;
      justCalculated = false;
      updateDisplay('0');
      updateExpression('');
    }

    // ── SIGN ──
    function handleSign() {
      const n = parseFloat(currentVal);
      currentVal = String(-n);
      updateDisplay(currentVal);
    }

    // ── PERCENT ──
    function handlePercent() {
      const n = parseFloat(currentVal);
      currentVal = String(n / 100);
      updateDisplay(currentVal);
    }

    // ── ERROR ──
    function showError() {
      updateDisplay('Error', false, true);
      updateExpression('Cannot divide by zero');
      operator = null;
      waitingForOperand = false;
      justCalculated = true;
      currentVal = '0';
    }

    // ── HISTORY ──
    function addHistory(entry) {
      history.unshift(entry);
      if (history.length > 3) history.pop();
      historyEl.innerHTML = '';
      history.forEach(h => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.textContent = h;
        historyEl.appendChild(el);
      });
    }

    // ── BUTTON CLICK EVENTS ──
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const value = btn.dataset.value;

        if (action === 'digit') inputDigit(value);
        else if (action === 'decimal') inputDecimal();
        else if (action === 'operator') handleOperator(value);
        else if (action === 'equals') handleEquals();
        else if (action === 'clear') handleClear();
        else if (action === 'sign') handleSign();
        else if (action === 'percent') handlePercent();
      });
    });

    // ── KEYBOARD SUPPORT ──
    const keyMap = {
      '0':'digit:0','1':'digit:1','2':'digit:2','3':'digit:3','4':'digit:4',
      '5':'digit:5','6':'digit:6','7':'digit:7','8':'digit:8','9':'digit:9',
      '.':'decimal',',':'decimal',
      '+':'operator:+','-':'operator:−','*':'operator:×','/':'operator:÷',
      'Enter':'equals','=':'equals',
      'Backspace':'backspace','Escape':'clear','%':'percent'
    };

    document.addEventListener('keydown', e => {
      const mapped = keyMap[e.key];
      if (!mapped) return;
      e.preventDefault();

      if (mapped === 'backspace') {
        if (currentVal.length > 1 && !waitingForOperand && !justCalculated) {
          currentVal = currentVal.slice(0, -1) || '0';
          updateDisplay(currentVal);
        } else {
          handleClear();
        }
        return;
      }

      if (mapped === 'clear') { handleClear(); return; }
      if (mapped === 'percent') { handlePercent(); return; }
      if (mapped === 'decimal') { inputDecimal(); return; }
      if (mapped === 'equals') { handleEquals(); return; }

      const [type, val] = mapped.split(':');
      if (type === 'digit') inputDigit(val);
      else if (type === 'operator') handleOperator(val);

      // Visual flash on keyboard press
      const opSymbols = { '+':'+','−':'-','×':'*','÷':'/' };
      document.querySelectorAll('.btn').forEach(b => {
        const bVal = b.dataset.value;
        if (
          (b.dataset.action === 'digit' && bVal === e.key) ||
          (b.dataset.action === 'operator' && opSymbols[bVal] === e.key) ||
          (b.dataset.action === 'equals' && (e.key === 'Enter' || e.key === '=')) ||
          (b.dataset.action === 'clear' && e.key === 'Escape') ||
          (b.dataset.action === 'decimal' && (e.key === '.' || e.key === ','))
        ) {
          b.style.transform = 'scale(0.92)';
          b.style.filter = 'brightness(1.3)';
          setTimeout(() => {
            b.style.transform = '';
            b.style.filter = '';
          }, 120);
        }
      });
    });
  </script>

</body>
</html>
